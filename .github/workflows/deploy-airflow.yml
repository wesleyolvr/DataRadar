name: Deploy Airflow to Astronomer

on:
  push:
    branches: [main]
    paths:
      - 'airflow/**'
      - '.github/workflows/deploy-airflow.yml'

jobs:
  deploy-airflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Astronomer
        uses: astronomer/deploy-action@v0.3
        with:
          deployment-id: ${{ secrets.ASTRONOMER_DEPLOYMENT_ID }}
          workspace: ${{ secrets.ASTRONOMER_WORKSPACE_ID }}
          root-folder: airflow
          force: true
