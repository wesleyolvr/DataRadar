name: Deploy Airflow to Astronomer

on:
  push:
    branches: [main]
    paths:
      - 'airflow/**'
      - '.github/workflows/deploy-airflow.yml'

jobs:
  deploy-airflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      - name: Deploy to Astronomer
        env:
          ASTRONOMER_TOKEN: ${{ secrets.ASTRONOMER_TOKEN }}
        run: |
          cd airflow
          echo "$ASTRONOMER_TOKEN" | astro login --token-stdin
          astro deploy ${{ secrets.ASTRONOMER_DEPLOYMENT_ID }} --force
